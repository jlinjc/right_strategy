<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Gravity 作戰中心 · 右側動能拉回</title>
<style>
  :root{
    --bg:#0a0e17; --panel:#121826; --panel2:#1a2233; --line:#26304a;
    --txt:#e6ecf5; --muted:#8a96ad; --accent:#4da3ff;
    --green:#2ecc71; --green-d:#155f3a; --red:#ff5a5a; --red-d:#5e1f1f;
    --yellow:#ffcb45; --yellow-d:#5e4d14; --mid:#3a4358;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"Segoe UI",
    "Microsoft JhengHei",sans-serif;line-height:1.5;padding:0 0 60px}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px}

  /* Header */
  header{background:linear-gradient(180deg,#0e1422,#0a0e17);border-bottom:1px solid var(--line);
    padding:18px 0;position:sticky;top:0;z-index:20;backdrop-filter:blur(6px)}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .orb{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#7fd0ff,#1a6fff 60%,#0a2a66);
    box-shadow:0 0 18px #2a7fff88}
  .brand h1{font-size:19px;letter-spacing:.5px}
  .brand .sub{font-size:12px;color:var(--muted)}
  .updated{font-size:12px;color:var(--muted);text-align:right}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:var(--accent)}

  /* Regime banner */
  .regime{margin:18px 0;border-radius:14px;padding:16px 20px;display:flex;align-items:center;
    gap:18px;border:1px solid var(--line)}
  .regime.green{background:linear-gradient(90deg,#0f2a1c,#121826);border-color:var(--green-d)}
  .regime.yellow{background:linear-gradient(90deg,#2a2510,#121826);border-color:var(--yellow-d)}
  .regime.red{background:linear-gradient(90deg,#2a1212,#121826);border-color:var(--red-d)}
  .light{width:46px;height:46px;border-radius:50%;flex:none}
  .green .light{background:var(--green);box-shadow:0 0 22px var(--green)}
  .yellow .light{background:var(--yellow);box-shadow:0 0 22px var(--yellow)}
  .red .light{background:var(--red);box-shadow:0 0 22px var(--red)}
  .regime .lbl{font-size:18px;font-weight:600}
  .regime .act{font-size:14px;color:var(--muted);margin-top:2px}
  .regime .qqq{margin-left:auto;text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .regime .qqq b{color:var(--txt);font-size:14px}

  /* Section */
  section{margin:26px 0}
  .stitle{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .stitle h2{font-size:16px;letter-spacing:.5px}
  .stitle .tag{font-size:11px;color:var(--muted);background:var(--panel2);
    border:1px solid var(--line);padding:2px 9px;border-radius:20px}
  .stitle .line{flex:1;height:1px;background:var(--line)}

  /* Playbook */
  .play{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .card h3{font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h3 .pill{font-size:11px;padding:2px 8px;border-radius:6px}
  .pill.in{background:var(--green-d);color:#aef5cd}
  .pill.out{background:#1d3a5e;color:#bfe0ff}
  .chk{display:flex;gap:10px;margin:9px 0;font-size:13.5px;align-items:flex-start}
  .chk .i{flex:none;width:20px;height:20px;border-radius:5px;display:grid;place-items:center;
    font-size:12px;font-weight:700}
  .chk.g .i{background:var(--green-d);color:#aef5cd}
  .chk.b .i{background:#1d3a5e;color:#bfe0ff}
  .expect{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;flex:1;min-width:120px}
  .kpi .v{font-size:22px;font-weight:700}
  .kpi .k{font-size:12px;color:var(--muted);margin-top:2px}
  .note{font-size:12.5px;color:var(--muted);margin-top:10px;padding-left:2px}

  /* Signal cards */
  .sigs{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .sig{background:linear-gradient(180deg,#13243a,#121826);border:1px solid #244065;
    border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
  .sig::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
  .sig .tk{font-size:20px;font-weight:700;letter-spacing:.5px}
  .sig .rs{font-size:11px;color:var(--muted);margin:2px 0 12px}
  .lvls{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .lvl{background:#0e1626;border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .lvl .k{font-size:10.5px;color:var(--muted)}
  .lvl .v{font-size:16px;font-weight:700;margin-top:1px}
  .lvl.entry .v{color:#bfe0ff}
  .lvl.stop .v{color:var(--red)}
  .lvl.tgt .v{color:var(--green)}
  .lvl.size .v{font-size:14px}
  .sigfoot{font-size:11.5px;color:var(--muted);margin-top:11px;border-top:1px dashed var(--line);padding-top:9px}
  .sigfoot b{color:var(--txt)}
  .empty{background:var(--panel);border:1px dashed var(--line);border-radius:12px;
    padding:26px;text-align:center;color:var(--muted)}

  /* Conviction tier + signal quality */
  .sig.tA::before{background:var(--green)}
  .sig.tB::before{background:var(--accent)}
  .sig.tC::before{background:var(--mid)}
  .tier{font-size:13px;font-weight:800;padding:3px 10px;border-radius:7px;letter-spacing:.5px}
  .tier.tA{background:var(--green-d);color:#aef5cd}
  .tier.tB{background:#1d3a5e;color:#bfe0ff}
  .tier.tC{background:#2a3145;color:#9fb0cc}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 6px}
  .tag2{font-size:10.5px;padding:2px 8px;border-radius:6px;background:#0e1626;
    border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .tag2.pead{background:#13301f;border-color:var(--green-d);color:#9fe7bd}
  .tag2.late{background:#2a2510;border-color:var(--yellow-d);color:#ffe39a}
  .tag2.sec{color:#bfe0ff}
  .tag2.ern{color:#d9c0ff}
  .pqrow{display:flex;align-items:center;gap:9px;margin:4px 0 2px;font-size:11px;color:var(--muted)}
  .pqbar{flex:1;height:6px;border-radius:4px;background:#0e1626;border:1px solid var(--line);overflow:hidden}
  .pqbar>i{display:block;height:100%;border-radius:4px}
  .warn{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .warnchip{font-size:10.5px;padding:3px 9px;border-radius:6px;background:var(--red-d);
    color:#ffc9c9;border:1px solid #7a2a2a;font-weight:600}
  .heatbanner{display:flex;align-items:center;gap:14px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:14px;
    font-size:13px;flex-wrap:wrap}
  .heatbanner .bar{flex:1;min-width:150px;height:9px;border-radius:5px;background:#0e1626;
    border:1px solid var(--line);overflow:hidden}
  .heatbanner .bar>i{display:block;height:100%}
  .heatbanner b{color:var(--txt)}

  /* Watch + tables */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;background:var(--panel2)}
  td:first-child,th:first-child{text-align:left}
  .tblwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  tr.win td{background:#0f2a1c33}
  tr.lose td{background:#2a121233}
  tr.win td:first-child{box-shadow:inset 3px 0 0 var(--green)}
  tr.lose td:first-child{box-shadow:inset 3px 0 0 var(--red)}
  .pos{color:var(--green)}.neg{color:var(--red)}

  /* Evidence accordion */
  .ev{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .ev>summary{padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;
    display:flex;align-items:center;gap:10px;list-style:none}
  .ev>summary::-webkit-details-marker{display:none}
  .ev>summary .ar{transition:.2s;color:var(--muted)}
  .ev[open]>summary .ar{transform:rotate(90deg)}
  .ev .body{padding:0 18px 16px}
  .ev .body .note{margin:0 0 12px}
  details.ev[open]>summary{border-bottom:1px solid var(--line)}

  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
  @media(max-width:720px){.play{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="wrap hrow">
    <div class="brand">
      <div class="orb"></div>
      <div>
        <h1>Anti-Gravity 作戰中心</h1>
        <div class="sub">右側動能 · 均線拉回 · 分批出場 — 一套用數據定案的紀律系統</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div class="updated" id="updated">載入中…</div>
      <button class="btn" onclick="loadAll()">↻ 重新整理</button>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- 大盤 REGIME -->
  <div class="regime" id="regime">
    <div class="light"></div>
    <div><div class="lbl">載入中…</div><div class="act"></div></div>
  </div>

  <!-- ★今日掛單建議(台美股:該買什麼/別追什麼/掛單價) -->
  <div id="buyList"></div>

  <!-- 核心-衛星 王者配置 -->
  <div id="coreBanner"></div>

  <!-- 台股版面板(同一套引擎搬到台股) -->
  <div id="taiwanPanel"></div>

  <!-- 台美股產業龍頭個股(衛星) -->
  <div id="leadersPanel"></div>

  <!-- 策略選單(各有優勢,投資人自選風險檔位) -->
  <div id="menuPanel"></div>

  <!-- 紀律總覽 -->
  <section>
    <div class="stitle"><h2>📜 策略紀律總覽</h2><span class="tag">照表操課，不臨場改主意</span><div class="line"></div></div>
    <div class="play">
      <div class="card">
        <h3><span class="pill in">進場</span> 四個條件全中才進</h3>
        <div id="entryRules"></div>
      </div>
      <div class="card">
        <h3><span class="pill out">出場</span> 分批落袋 + 抱住贏家</h3>
        <div id="exitRules"></div>
      </div>
    </div>
    <div class="expect" id="expect"></div>
    <div class="note" id="expectNote"></div>
  </section>

  <!-- 真實風險 / 穩健性 -->
  <section>
    <div class="stitle"><h2>🛡️ 真實風險 — 別被回測騙</h2><span class="tag">投大資金前必看</span><div class="line"></div></div>
    <div id="robust"></div>
  </section>

  <!-- 今日信號 -->
  <section>
    <div class="stitle"><h2>🎯 今日進場信號卡</h2><span class="tag" id="sigCount">—</span><div class="line"></div></div>
    <div id="heatBanner"></div>
    <div class="sigs" id="signals"></div>
  </section>

  <!-- 醞釀中 -->
  <section>
    <div class="stitle"><h2>👀 醞釀中觀察清單</h2><span class="tag">站上200MA+動能正+正在靠近拉回均線</span><div class="line"></div></div>
    <div class="tblwrap"><table id="watch"></table></div>
  </section>

  <!-- 回測實證 -->
  <section>
    <div class="stitle"><h2>🔬 回測實證 — 為什麼敢照這套做</h2><span class="tag" id="evDate">—</span><div class="line"></div></div>
    <div id="evidence"></div>
  </section>

  <div class="foot" id="foot"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmtF = v => (v==null ? '—' : v);
async function getJSON(f){ const r = await fetch(f + '?t=' + Date.now()); if(!r.ok) throw 0; return r.json(); }

function renderRegime(rg){
  const el = $('#regime');
  el.className = 'regime ' + rg.light;
  el.innerHTML = `
    <div class="light"></div>
    <div>
      <div class="lbl">${rg.label}</div>
      <div class="act">▶ 紀律動作：${rg.action}</div>
    </div>
    <div class="qqq">
      QQQ <b>${rg.qqq_close}</b><br>
      21EMA ${rg.ema21} · 50MA ${rg.ma50}<br>
      200MA ${rg.ma200}
    </div>`;
}

function renderPlaybook(ev, cfg){
  const fc = ev.final_config;
  $('#entryRules').innerHTML = fc.entry.map(t =>
    `<div class="chk g"><span class="i">✓</span><span>${t}</span></div>`).join('');
  $('#exitRules').innerHTML = fc.exit.map(t =>
    `<div class="chk b"><span class="i">▸</span><span>${t}</span></div>`).join('');
  const e = fc.expectation;
  $('#expect').innerHTML = `
    <div class="kpi"><div class="v">${e.sharpe}</div><div class="k">OOS Sharpe (3年)</div></div>
    <div class="kpi"><div class="v">${e.pf}</div><div class="k">獲利因子 PF</div></div>
    <div class="kpi"><div class="v">${e.wr}</div><div class="k">勝率 WR</div></div>
    <div class="kpi"><div class="v neg">${e.mdd}</div><div class="k">最大回撤 MDD</div></div>`;
  $('#expectNote').textContent = '※ ' + e.note;
}

// ── 兩策略今日操作面板(A 全押SMH / B 輪動最強) ──
let LAST_CS = null;
function moneyFmt(n){ return '$'+Math.round(n).toLocaleString(); }
function stratInstr(d, cap, lev){
  lev = lev || 1;
  const r = {price:d?d.close:0, expo:0, dollars:0, shares:0, entry:d?d.entry_cap:null,
             exit:d?d.exit_price:null, verb:'—', holder:'', buyer:''};
  if(!d) return r;
  const expo = (d.suggested_expo!=null ? d.suggested_expo : 0) * lev;
  r.expo = expo; r.dollars = cap*expo; r.shares = d.close>0 ? r.dollars/d.close : 0;
  if(d.credit_cut){ r.verb='🔴 出場→現金'; r.holder='信用示警:全部出場轉現金';
                    r.buyer='不進場(等HYG站回200MA)'; r.expo=0; r.dollars=0; r.shares=0; return r; }
  switch(d.state){
    case 'risk_on':
      r.verb='🟢 持有 / 可進';
      r.holder=`調整到曝險 ${Math.round(expo*100)}% = ${moneyFmt(r.dollars)} (${Math.round(r.shares)}股)`;
      r.buyer = (d.entry_state==='can_enter')
        ? `可進場：限價 ≤ $${d.entry_cap}，買 ${Math.round(r.shares)}股 ≈ ${moneyFmt(r.dollars)}（停損距 -${d.stop_risk_pct}%）`
        : `🟡 追高,等拉回到 ≤ $${d.entry_cap} 再進（距50MA ${d.dist50_pct>0?'+':''}${d.dist50_pct}%）`;
      break;
    case 'panic_watch':
      r.verb='🟠 恐慌容忍'; r.holder='維持現有曝險,給3日確認別砍V底'; r.buyer='暫不加碼'; break;
    case 'warning':
      r.verb='🟡 逼近停損'; r.holder='收盤跌破停損線即全出'; r.buyer='不進場';
      r.expo=0;r.dollars=0;r.shares=0; break;
    default:
      r.verb='🔴 出場→現金'; r.holder='已跌破200MA→全部現金,等站回'; r.buyer='不進場(等站回200MA)';
      r.expo=0;r.dollars=0;r.shares=0;
  }
  return r;
}
function cardHTML(title, sub, tk, d, cap, lev){
  const it = stratInstr(d, cap, lev);
  return `
  <div style="background:#0b1727;border:1px solid #1d3a5e;border-radius:10px;padding:12px;height:100%">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:6px">
      <div style="font-weight:800;font-size:14px">${title}</div>
      <div style="font-size:12px;color:#6fd0ff;white-space:nowrap">${tk||'—'} $${d?d.close:'—'}${d&&d.rs_score!=null?' · RS'+d.rs_score:''}</div>
    </div>
    <div style="color:var(--muted);font-size:11px;margin-bottom:8px">${sub}</div>
    <div style="font-size:16px;font-weight:800;margin:4px 0">${it.verb}</div>
    <table style="width:100%;font-size:12.5px;border-collapse:collapse">
      <tr><td style="color:var(--muted);padding:3px 0;vertical-align:top">🏠 持有者</td><td style="text-align:right">${it.holder}</td></tr>
      <tr><td style="color:var(--muted);padding:3px 0;vertical-align:top">💵 空手者</td><td style="text-align:right">${it.buyer}</td></tr>
      <tr><td style="color:var(--muted);padding:3px 0">🎯 進場上限價</td><td style="text-align:right;color:#7ee0a0;font-weight:700">$${it.entry!=null?it.entry:'—'}</td></tr>
      <tr><td style="color:var(--muted);padding:3px 0">🛑 出場/停損價</td><td style="text-align:right;color:#e06a6a;font-weight:700">$${it.exit!=null?it.exit:'—'}</td></tr>
      <tr><td style="color:var(--muted);padding:3px 0">📊 建議曝險→金額</td><td style="text-align:right;font-weight:800;color:#7ee0a0">${Math.round(it.expo*100)}% = ${moneyFmt(it.dollars)} (${Math.round(it.shares)}股)</td></tr>
    </table>
  </div>`;
}
function updateCards(cs){
  if(!cs || !cs.cores) return;
  const capA = Number(localStorage.getItem('capA')||10000);
  const capB = Number(localStorage.getItem('capB')||10000);
  const lev = Number(localStorage.getItem('lev')||1);
  const A = cs.cores['SMH'];
  // ★ B 用「最低持有30日鎖」後的實際持有(rotation_hold),非每日生變的最強
  const rh = cs.rotation_hold || {};
  const Bp = rh.ticker || cs.strongest;
  const B = Bp ? cs.cores[Bp] : null;
  let lockTxt;
  if(rh.ticker){
    if(rh.locked) lockTxt = `🔒 已抱${rh.days_held}日·還${rh.lock_days_left}日滿鎖才可換`
      + (rh.today_strongest&&rh.today_strongest!==rh.ticker?`（今日最強 ${rh.today_strongest}，滿鎖再換）`:'');
    else lockTxt = `🔓 已滿${rh.min_hold_days||30}日可換（今日最強 ${rh.today_strongest||'—'}）`;
    if(rh.forced_out_prev) lockTxt += ' ⚠️前任跌破已被換出';
  } else lockTxt = '空手（無核心站上200MA 或 信用砍0）';
  const ca=$('#cardA'), cb=$('#cardB');
  if(ca) ca.innerHTML = cardHTML('🅰️ A · 抱SMH（核心）','擇時抱半導體龍頭·換手少·稅最省','SMH',A,capA,lev);
  if(cb) cb.innerHTML = cardHTML('🅱️ B · 輪動最強（衛星）','最低持有30日·跌破立刻出 — '+lockTxt, Bp||'(全在200MA下)', B, capB,lev);
}
function setCap(k,v){ localStorage.setItem(k, v||0); localStorage.setItem('allocMode','custom'); updateCards(LAST_CS); refreshShellChrome(); }
function setLev(v){ localStorage.setItem('lev', v||1); updateCards(LAST_CS); }
// ★ 配置模式預設(research_core_satellite.py / confirm_refinements.py):一鍵設好 A/B 比例 + 槓桿
function setMode(m){
  const total = Number(localStorage.getItem('capA')||10000) + Number(localStorage.getItem('capB')||10000);
  let a,b,lev;
  if(m==='core'){ a=total; b=0; lev=1; }            // 🛡️ 純A:省事
  else if(m==='balanced'){ a=total/2; b=total/2; lev=1; }   // ⚖️ A+B各半:最穩
  else { a=total*0.6; b=total*0.4; lev=1.35; }      // 🚀 A60/B40×1.35:最大財富
  localStorage.setItem('capA',Math.round(a)); localStorage.setItem('capB',Math.round(b));
  localStorage.setItem('lev',lev); localStorage.setItem('allocMode',m);
  updateCards(LAST_CS); refreshShellChrome();
}
function refreshShellChrome(){ const el=$('#twoStratShell'); if(el) el.innerHTML=twoStratShell(); }
function twoStratShell(){
  const capA = Number(localStorage.getItem('capA')||10000);
  const capB = Number(localStorage.getItem('capB')||10000);
  const lev = Number(localStorage.getItem('lev')||1);
  const mode = localStorage.getItem('allocMode')||'custom';

// ★ 殺盤紀律橫幅:一眼看出「今天該不該動手」,防恐慌砍底(真edge=不手賤)
function disciplineBanner(cs){
  if(!cs || !cs.cores) return '';
  const A = cs.cores['SMH']; if(!A) return '';
  let bg,emoji,msg;
  if(A.credit_cut){ bg='#3a1620'; emoji='🔴'; msg=`信用示警 → 今天<b>出場轉現金</b>(HYG/LQD 跌破)。這是少數該動手的日子。`; }
  else if(A.state==='risk_on'){ bg='#12251a'; emoji='✅'; msg=`SMH 沒破線(停損 <b>$${A.exit_price}</b>)→ <b>續抱,今天不要動手</b>。盤中殺盤是雜訊,只看收盤、只在<b>收盤跌破 $${A.exit_price}</b>才出。`; }
  else if(A.state==='warning'){ bg='#2a2410'; emoji='🟡'; msg=`SMH 逼近停損 <b>$${A.exit_price}</b> → 不要提前砍,<b>收盤跌破才出</b>,否則續抱。`; }
  else if(A.state==='panic_watch'){ bg='#2a1e10'; emoji='🟠'; msg=`恐慌跌破但 VIX 高+信用尚健康 → <b>給3日確認,別砍在 V 底</b>(維持現倉)。`; }
  else { bg='#3a1620'; emoji='🔴'; msg=`SMH 已跌破停損 <b>$${A.exit_price}</b> → <b>出場轉現金</b>,等站回再進。`; }
  return `
  <div style="background:${bg};border:1px solid #2a4a72;border-radius:12px;padding:12px 16px;margin:10px 0;display:flex;gap:12px;align-items:center">
    <div style="font-size:30px">${emoji}</div>
    <div><div style="font-weight:800;font-size:14px;margin-bottom:2px">📋 今日紀律</div>
      <div style="font-size:13px;line-height:1.5">${msg}</div>
      <div style="color:var(--muted);font-size:11px;margin-top:3px">真 edge = 熊市躲現金 + 不手賤砍底(擇時相對買持只多 +0.08 Sharpe)。紀律比參數值錢。</div>
    </div>
  </div>`;
}

  const txt = {risk_on:'抱住(滿核心倉)', risk_off:'轉現金(空手等站回200MA)', warning:'逼近200MA,跌破即出',

               core_warning:'核心跌破,出場'};

  const nSig = (sig && sig.n_signals!=null) ? sig.n_signals : '—';

        <div style="flex:1;min-width:260px">
          <div style="font-size:12px;color:var(--muted)">🛡️ 核心(70%) — 擇時指數 @200MA + 信用카那리아 + 恐慌容忍</div>
          <div style="font-size:18px;font-weight:800;margin:3px 0">${emo[verdict.state]||'⚪'} ${cs.primary}：${verdict.action||txt[verdict.state]||''}</div>

function renderHeatBanner(d){
  const el = $('#heatBanner');
  const h = d.portfolio_heat; const max = (d.config.max_portfolio_heat_pct)||3;
  const gmax = (d.config.max_gross_exposure_pct)||150;
  if(!h){ el.innerHTML=''; return; }
  const pct = h.open_heat_pct||0;
  const gpct = h.open_gross_pct||0;
  const w = Math.min(pct/max*100, 100);
  const gw = Math.min(gpct/gmax*100, 100);
  const col = pct >= max ? 'var(--red)' : (pct >= max*0.67 ? 'var(--yellow)' : 'var(--green)');
  const gcol = gpct >= gmax ? 'var(--red)' : (gpct >= gmax*0.67 ? 'var(--yellow)' : 'var(--green)');
  const held = (h.held_tickers&&h.held_tickers.length)
    ? h.held_tickers.join(', ') : '無持倉';
  const secs = h.sector_counts ? Object.entries(h.sector_counts)
    .map(([s,n])=>`${s}×${n}`).join(' · ') : '';
  el.innerHTML = `
    <div>🔥 組合熱度 <b>${pct.toFixed(2)}%</b> / 上限 ${max}%　（停損距離左尾）</div>
    <div class="bar"><i style="width:${w}%;background:${col}"></i></div>
    <div style="margin-top:6px">📦 gross 名目曝險 <b>${gpct.toFixed(1)}%</b> / 上限 ${gmax}%　（群聚跳空左尾）</div>
    <div class="bar"><i style="width:${gw}%;background:${gcol}"></i></div>
    <div style="color:var(--muted);font-size:12px">持倉：${held}${secs?'　|　'+secs:''}</div>`;
}

const STAT = ['win','lose','mid'];
function evTable(step){
  const rows = step.rows.map(r => {
    let cls = '', cells = r.slice();
    if(STAT.includes(cells[cells.length-1])){ cls = cells.pop(); }
    return `<tr class="${cls}">${cells.map((c,i)=>`<td>${c}</td>`).join('')}</tr>`;
  }).join('');
  const head = step.cols ? `<thead><tr>${step.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>` : '';
  return `<div class="tblwrap"><table>${head}<tbody>${rows}</tbody></table></div>`;
}

// ── ★今日掛單建議:把策略翻成「該買什麼/別追/掛單價/原因」(台美股共用) ──
function buyRows(cores, isTW, heldTk, strongestTk){
  const rows=[];
  for(const tk in cores){
    const d=cores[tk]; if(!d || d.watch_only) continue;
    const cut=d.credit_cut;
    const tag = tk===heldTk ? '🅱️持有' : (tk===strongestTk ? '👑最強' : '');
    let bucket, action, limit, reason, color;
    if(cut || d.state==='risk_off' || d.entry_state==='no_entry' || d.dist_pct<0){
      bucket=3; color='#e06a6a'; action='🔴 不要碰';
      limit='—'; reason = cut ? '信用/費半哨示警→現金' : '在200MA之下,趨勢轉空,等站回再說';
    } else if(d.entry_state==='extended'){
      bucket=2; color='#e0b46a'; action='🟡 別追高';
      limit = isTW ? `等拉回:現價需回到 +${d.entry_cap_pct}% 以內` : `等拉回 ≤ $${d.entry_cap}`;
      reason = `距50MA +${d.dist50_pct}% 已超過門檻 +${Math.round((d.entry_thr-1)*100)}%＝追高區,別追`;
    } else if(d.entry_state==='can_enter'){
      const cheap = d.stop_risk_pct<=12;
      bucket = cheap?0:1; color='#7ee0a0'; action = cheap?'🟢 可買(便宜)':'🟢 可買(偏貴小量)';
      limit = isTW ? `限價 ≤ 現價 +${d.entry_cap_pct}%` : `限價 ≤ $${d.entry_cap}`;
      reason = cheap
        ? `貼近均線,停損僅 ${d.stop_risk_pct}%＝便宜,可進。曝險建議 ${Math.round((d.suggested_expo||0)*100)}%`
        : `在趨勢中但離200MA遠(停損 ${d.stop_risk_pct}%)→曝險自動調小到 ${Math.round((d.suggested_expo||0)*100)}%,只小量`;
    } else { continue; }
    const stop = isTW ? `現價 ${d.exit_pct}%` : `$${d.exit_price}`;
    rows.push({bucket,tk,name:d.name||'',tag,action,color,limit,stop,
               dist:`${d.dist_pct>0?'+':''}${d.dist_pct}%/${d.dist50_pct>0?'+':''}${d.dist50_pct}%`,reason});
  }
  rows.sort((a,b)=>a.bucket-b.bucket);
  return rows;
}

  if(!ld || !ld.leaders){ el.innerHTML=''; return; }
  el.innerHTML = `
  <div style="background:#0e1b2e;border:1px solid #2a4a72;border-radius:12px;padding:14px 16px;margin:10px 0">
    <div style="font-weight:800;font-size:15px">🏆 台美股產業龍頭個股 <span style="color:var(--muted);font-weight:400;font-size:11px">(衛星·同趨勢引擎·依產業分組·更新 ${ld.last_updated||''})</span></div>
    <div style="color:var(--muted);font-size:11px;margin:3px 0 8px">🟢可進=站上200MA沒追高 · 🟡別追=超門檻等拉回 · 🔴避=跌破200MA。每檔標 距200MA% 與掛單價(滑鼠移上看停損/RS)。</div>
    <div style="display:flex;gap:18px;flex-wrap:wrap">
      ${leaderCol('🇺🇸','美股龍頭', ld.leaders.US, false)}
      ${leaderCol('🇹🇼','台股龍頭（價位用%×券商現價）', ld.leaders.TW, true)}
    </div>
    <div style="color:var(--muted);font-size:11px;margin-top:8px">⚠️ ${ld.note||''}<br>${ld.params_note||''}</div>
  </div>`;
}

async function loadAll(){
  try{
    const [sig, ev, rb, cs, mn, tw, ld] = await Promise.all([
      getJSON('strategy_signals.json'),
      getJSON('backtest_evidence.json'),
      getJSON('robustness.json').catch(()=>null),
      getJSON('core_status.json').catch(()=>null),
      getJSON('strategy_menu.json').catch(()=>null),
      getJSON('taiwan_status.json').catch(()=>null),
      getJSON('leaders_status.json').catch(()=>null),
    ]);
    $('#updated').innerHTML = `信號更新 ${sig.last_updated}<br>實證更新 ${ev.last_updated}`;
    renderRegime(sig.regime);
    renderBuyList(cs, tw);
    renderCore(cs, sig);
    renderTaiwan(tw);
    renderLeaders(ld);
    renderMenu(mn);
    renderPlaybook(ev, sig.config);
    renderRobust(rb);
    renderSignals(sig);
    renderWatch(sig);
    renderEvidence(ev);
    $('#foot').textContent = `${sig.config.universe||''}　|　進場：${sig.config.entry}　|　出場：${sig.config.exit}`;
  }catch(e){
    $('#regime').innerHTML = '<div class="lbl" style="color:var(--red)">⚠️ 資料載入失敗</div>'+
      '<div class="act">請先執行：python generate_signals.py 與 python generate_evidence.py，再用 web_server.py 開啟。</div>';
  }
}
loadAll();
</script>
</body>
</html>
